// ── ESTADO DA APLICAÇÃO ───────────────────────────────────────────────────────
let appMode      = 'loading'; // loading | auth | nickname | lobby | game
let sb           = null;      // Supabase client instance
let currentUser  = null;
let currentProfile = null;
let currentRoom  = null;
let roomChannel  = null;
let lobbyChannel = null;
let isPlayer1    = false;
let isOfflineMode = false;
let availableRooms = [];

// ── ESTADO DO JOGO (offline e online compartilham as mesmas variáveis) ────────
let gameState  = 'start'; // start | playing | resolving | result | gameover
let playerDeck = [];
let cpuDeck    = [];
let tiedCards  = [];
let turn       = 'player'; // player | cpu
let selectedStat = null;
let roundWinner  = null;

// ── INICIALIZAÇÃO ─────────────────────────────────────────────────────────────
async function init() {
    updateInfoTexts();
    initParticles();
    animateParticles();
    await initSupabase();
}

function toggleLang(lang) {
    currentLang = lang;
    document.getElementById('btn-pt').className = currentLang === 'pt'
        ? 'px-3 py-1 rounded-full font-bold text-sm bg-blue-600 text-white transition-opacity'
        : 'px-3 py-1 rounded-full font-bold text-sm bg-transparent text-slate-300 transition-opacity hover:bg-slate-700';
    document.getElementById('btn-en').className = currentLang === 'en'
        ? 'px-3 py-1 rounded-full font-bold text-sm bg-blue-600 text-white transition-opacity'
        : 'px-3 py-1 rounded-full font-bold text-sm bg-transparent text-slate-300 transition-opacity hover:bg-slate-700';
    updateInfoTexts();
    render();
}

function updateInfoTexts() {
    const el = (id) => document.getElementById(id);
    if (el('text-info-title')) {
        el('text-info-title').innerText     = t('infoTitle');
        el('text-rules-title').innerText    = t('rulesTitle');
        el('text-rules-desc').innerText     = t('rulesDesc');
        el('text-pedagogy-title').innerText = t('pedagogyTitle');
        el('text-pedagogy-desc').innerText  = t('pedagogyDesc');
    }
}

// ── SUPABASE ──────────────────────────────────────────────────────────────────
async function initSupabase() {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Keep auth state in sync
    sb.auth.onAuthStateChange(async (_event, session) => {
        const newUser = session?.user ?? null;
        if (newUser?.id !== currentUser?.id) {
            currentUser = newUser;
            if (currentUser) {
                await loadProfile();
            } else {
                currentProfile = null;
                _cleanupChannels();
                appMode = 'auth';
                render();
            }
        }
    });

    const { data: { session } } = await sb.auth.getSession();
    currentUser = session?.user ?? null;
    if (currentUser) {
        await loadProfile();
    } else {
        appMode = 'auth';
        render();
    }
}

// ── AUTENTICAÇÃO ──────────────────────────────────────────────────────────────
async function signInWithGoogle() {
    playSfx('click');
    await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin }
    });
}

async function signOut() {
    playSfx('click');
    if (currentRoom) await leaveRoom(true);
    _cleanupChannels();
    await sb.auth.signOut();
    currentUser    = null;
    currentProfile = null;
    isOfflineMode  = false;
    appMode = 'auth';
    render();
}

function _cleanupChannels() {
    if (lobbyChannel) { lobbyChannel.unsubscribe(); lobbyChannel = null; }
    if (roomChannel)  { roomChannel.unsubscribe();  roomChannel  = null; }
}

// ── PERFIL / NICKNAME ─────────────────────────────────────────────────────────
async function loadProfile() {
    const { data } = await sb
        .from(TBL_PROFILES)
        .select('*')
        .eq('id', currentUser.id)
        .maybeSingle();
    currentProfile = data;
    if (!currentProfile) {
        appMode = 'nickname';
        render();
    } else {
        appMode = 'lobby';
        render();
        await loadRooms();
    }
}

async function saveNickname() {
    const input = document.getElementById('nickname-input');
    if (!input) return;
    const nickname = input.value.trim();
    if (nickname.length < 2 || nickname.length > 20) {
        _showFormError('nickname-error', currentLang === 'pt'
            ? 'Nick deve ter entre 2 e 20 caracteres.'
            : 'Nickname must be 2–20 characters.');
        return;
    }
    const { error } = await sb.from(TBL_PROFILES).upsert({ id: currentUser.id, nickname });
    if (error) {
        _showFormError('nickname-error', currentLang === 'pt'
            ? 'Nickname já em uso. Tente outro.'
            : 'Nickname already taken. Try another.');
        return;
    }
    currentProfile = { id: currentUser.id, nickname };
    appMode = 'lobby';
    render();
    await loadRooms();
}

function _showFormError(id, msg) {
    const el = document.getElementById(id);
    if (el) { el.textContent = msg; el.classList.remove('hidden'); }
}

// ── LOBBY ─────────────────────────────────────────────────────────────────────
async function loadRooms() {
    const { data } = await sb
        .from(TBL_GAME_ROOMS)
        .select('id, player1_nickname, created_at')
        .eq('status', 'waiting')
        .order('created_at', { ascending: true });
    availableRooms = data ?? [];
    if (appMode === 'lobby') render();

    if (!lobbyChannel) {
        lobbyChannel = sb.channel('lobby-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: TBL_GAME_ROOMS }, async () => {
                const { data: rooms } = await sb
                    .from(TBL_GAME_ROOMS)
                    .select('id, player1_nickname, created_at')
                    .eq('status', 'waiting')
                    .order('created_at', { ascending: true });
                availableRooms = rooms ?? [];
                if (appMode === 'lobby') render();
            })
            .subscribe();
    }
}

async function createRoom() {
    playSfx('click');
    const shuffled = [...MASTER_DECK].sort(() => Math.random() - 0.5);
    const selected = shuffled.slice(0, 10);

    const { data, error } = await sb.from(TBL_GAME_ROOMS).insert({
        player1_id:       currentUser.id,
        player1_nickname: currentProfile.nickname,
        player1_deck:     selected.slice(0, 5),
        player2_deck:     selected.slice(5, 10),
        tied_cards:       [],
        current_turn:     currentUser.id,
        game_phase:       'playing',
        status:           'waiting'
    }).select().single();

    if (error) { console.error('createRoom:', error); return; }

    isPlayer1   = true;
    currentRoom = data;
    appMode     = 'game';
    render();
    subscribeToRoom(data.id);
}

async function joinRoom(roomId) {
    playSfx('click');
    const { data, error } = await sb
        .from(TBL_GAME_ROOMS)
        .update({
            player2_id:       currentUser.id,
            player2_nickname: currentProfile.nickname,
            status:           'playing'
        })
        .eq('id', roomId)
        .eq('status', 'waiting')
        .select()
        .single();

    if (error || !data) {
        alert(currentLang === 'pt' ? 'Sala não disponível. Tente outra.' : 'Room not available. Try another.');
        await loadRooms();
        return;
    }

    isPlayer1   = false;
    currentRoom = data;
    appMode     = 'game';
    syncLocalStateFromRoom();
    subscribeToRoom(roomId);
    render();
}

async function leaveRoom(silent = false) {
    if (!currentRoom) return;
    if (roomChannel) { roomChannel.unsubscribe(); roomChannel = null; }
    if (!silent && currentRoom.status !== 'finished') {
        await sb.from(TBL_GAME_ROOMS).update({ status: 'finished' }).eq('id', currentRoom.id);
    }
    currentRoom = null;
    isPlayer1   = false;
    if (!silent) {
        appMode = 'lobby';
        render();
        await loadRooms();
    }
}

function playOffline() {
    playSfx('click');
    isOfflineMode = true;
    currentRoom = null;
    if (roomChannel) { roomChannel.unsubscribe(); roomChannel = null; }
    gameState = 'start';
    playerDeck = []; cpuDeck = []; tiedCards = [];
    turn = 'player'; selectedStat = null; roundWinner = null;
    appMode = 'game';
    render();
}

function goToLobby() {
    playSfx('click');
    isOfflineMode = false;
    currentRoom   = null;
    gameState     = 'start';
    appMode       = 'lobby';
    render();
    loadRooms();
}

// ── REALTIME ──────────────────────────────────────────────────────────────────
function subscribeToRoom(roomId) {
    if (roomChannel) roomChannel.unsubscribe();
    roomChannel = sb.channel('room-' + roomId)
        .on(
            'postgres_changes',
            { event: 'UPDATE', schema: 'public', table: TBL_GAME_ROOMS, filter: 'id=eq.' + roomId },
            (payload) => {
                currentRoom = { ...currentRoom, ...payload.new };
                syncLocalStateFromRoom();
                render();
            }
        )
        .subscribe();
}

function syncLocalStateFromRoom() {
    if (!currentRoom) return;
    playerDeck   = isPlayer1 ? (currentRoom.player1_deck ?? []) : (currentRoom.player2_deck ?? []);
    cpuDeck      = isPlayer1 ? (currentRoom.player2_deck ?? []) : (currentRoom.player1_deck ?? []);
    tiedCards    = currentRoom.tied_cards ?? [];
    turn         = currentRoom.current_turn === currentUser.id ? 'player' : 'cpu';
    gameState    = currentRoom.game_phase;
    selectedStat = currentRoom.selected_stat ?? null;

    const rw = currentRoom.round_winner;
    if (!rw)              roundWinner = null;
    else if (rw === 'draw')    roundWinner = 'draw';
    else if (rw === 'player1') roundWinner = isPlayer1 ? 'player' : 'cpu';
    else                       roundWinner = isPlayer1 ? 'cpu'    : 'player';
}

// ── LÓGICA MULTIPLAYER ────────────────────────────────────────────────────────
async function mpHandleStatSelect(statKey) {
    if (!currentRoom || gameState !== 'playing' || turn !== 'player') return;
    playSfx('click');
    playSfx('tick');
    // Atualização otimista para UI responder imediatamente
    selectedStat = statKey;
    gameState    = 'resolving';
    render();

    await sb.from(TBL_GAME_ROOMS).update({
        selected_stat: statKey,
        game_phase:    'resolving',
        updated_at:    new Date().toISOString()
    }).eq('id', currentRoom.id);

    setTimeout(() => mpResolveRound(statKey), 2000);
}

async function mpResolveRound(statKey) {
    if (!currentRoom) return;
    const myCard  = isPlayer1 ? currentRoom.player1_deck[0] : currentRoom.player2_deck[0];
    const oppCard = isPlayer1 ? currentRoom.player2_deck[0] : currentRoom.player1_deck[0];
    const myVal   = myCard.stats[statKey];
    const oppVal  = oppCard.stats[statKey];
    const isLowerBetter = statKey === 'cost';

    let winner;
    if (myVal === oppVal) {
        winner = 'draw';
        playSfx('draw');
    } else {
        const iWin = isLowerBetter ? myVal < oppVal : myVal > oppVal;
        winner = iWin
            ? (isPlayer1 ? 'player1' : 'player2')
            : (isPlayer1 ? 'player2' : 'player1');
        playSfx(iWin ? 'win' : 'lose');
    }

    await sb.from(TBL_GAME_ROOMS).update({
        game_phase:   'result',
        round_winner: winner,
        updated_at:   new Date().toISOString()
    }).eq('id', currentRoom.id);
}

async function mpNextRound() {
    if (!currentRoom || gameState !== 'result') return;
    const rw = currentRoom.round_winner;
    // Somente o vencedor avança (empate: player1 avança)
    const canTrigger = rw === 'draw'
        ? isPlayer1
        : (rw === 'player1' ? isPlayer1 : !isPlayer1);
    if (!canTrigger) return;

    playSfx('click');
    const p1Deck = [...currentRoom.player1_deck];
    const p2Deck = [...currentRoom.player2_deck];
    let tied     = [...currentRoom.tied_cards];

    const p1Card = p1Deck.shift();
    const p2Card = p2Deck.shift();

    let nextTurn = currentRoom.current_turn;
    let newTied  = tied;

    if (rw === 'player1') {
        p1Deck.push(p1Card, p2Card, ...tied);
        newTied  = [];
        nextTurn = currentRoom.player1_id;
    } else if (rw === 'player2') {
        p2Deck.push(p2Card, p1Card, ...tied);
        newTied  = [];
        nextTurn = currentRoom.player2_id;
    } else {
        newTied = [...tied, p1Card, p2Card]; // empate: acumula
    }

    const isGameOver = p1Deck.length === 0 || p2Deck.length === 0;
    const winnerId   = isGameOver
        ? (p1Deck.length > 0 ? currentRoom.player1_id : currentRoom.player2_id)
        : null;

    await sb.from(TBL_GAME_ROOMS).update({
        player1_deck:  p1Deck,
        player2_deck:  p2Deck,
        tied_cards:    newTied,
        current_turn:  nextTurn,
        game_phase:    isGameOver ? 'gameover' : 'playing',
        status:        isGameOver ? 'finished' : 'playing',
        round_winner:  null,
        selected_stat: null,
        winner_id:     winnerId,
        updated_at:    new Date().toISOString()
    }).eq('id', currentRoom.id);
}

// ── LÓGICA OFFLINE / CPU (mantida do original) ────────────────────────────────
function startGame() {
    playSfx('click');
    const shuffled = [...MASTER_DECK].sort(() => Math.random() - 0.5);
    const selected = shuffled.slice(0, 10);
    playerDeck   = selected.slice(0, 5);
    cpuDeck      = selected.slice(5, 10);
    gameState    = 'playing';
    turn         = 'player';
    selectedStat = null;
    roundWinner  = null;
    tiedCards    = [];
    render();
}

function handleStatSelect(statKey) {
    if (gameState !== 'playing' || turn !== 'player') return;
    playSfx('click');
    selectedStat = statKey;
    gameState    = 'resolving';
    playSfx('tick');
    render();
    setTimeout(() => resolveRound(statKey), 2000);
}

function resolveRound(statKey) {
    const pVal = playerDeck[0].stats[statKey];
    const cVal = cpuDeck[0].stats[statKey];
    const isLowerBetter = statKey === 'cost';
    if (pVal === cVal) {
        roundWinner = 'draw'; playSfx('draw');
    } else if (isLowerBetter) {
        roundWinner = pVal < cVal ? 'player' : 'cpu';
        playSfx(roundWinner === 'player' ? 'win' : 'lose');
    } else {
        roundWinner = pVal > cVal ? 'player' : 'cpu';
        playSfx(roundWinner === 'player' ? 'win' : 'lose');
    }
    gameState = 'result';
    render();
}

function nextRound() {
    playSfx('click');
    const pCard = playerDeck.shift();
    const cCard = cpuDeck.shift();
    if (roundWinner === 'player')   { playerDeck.push(pCard, cCard, ...tiedCards); tiedCards = []; turn = 'player'; }
    else if (roundWinner === 'cpu') { cpuDeck.push(cCard, pCard, ...tiedCards);   tiedCards = []; turn = 'cpu';    }
    else                            { tiedCards.push(pCard, cCard); }
    selectedStat = null;
    roundWinner  = null;
    if (playerDeck.length === 0 || cpuDeck.length === 0) {
        gameState = 'gameover';
    } else {
        gameState = 'playing';
        if (turn === 'cpu') setTimeout(cpuPlayRound, 1500);
    }
    render();
}

function cpuPlayRound() {
    if (gameState !== 'playing' || turn !== 'cpu' || cpuDeck.length === 0) return;
    const card = cpuDeck[0];
    let bestStat = 'maxTemp', maxRel = -1;
    const maxPossibles = { lifetime: 100, cost: 100, impact: 100, resistance: 100, maxTemp: 4000 };
    Object.keys(card.stats).forEach(stat => {
        const val = stat === 'cost' ? 100 - card.stats[stat] : card.stats[stat];
        const rel = val / maxPossibles[stat];
        if (rel > maxRel) { maxRel = rel; bestStat = stat; }
    });
    selectedStat = bestStat;
    gameState    = 'resolving';
    playSfx('tick');
    render();
    setTimeout(() => resolveRound(bestStat), 2000);
}

function getCardHTML(card, isHidden, isWinner, isActive, statFn) {
    if (!card) return '';

    if (isHidden) {
        return `
        <div class="w-64 md:w-72 h-[26rem] md:h-[28rem] bg-gradient-to-br from-blue-900 to-indigo-900 rounded-xl
                    border-4 border-indigo-500 shadow-xl flex flex-col items-center justify-center

            <i data-lucide="rocket" class="w-16 h-16 text-blue-300 mb-4 opacity-80"></i>

                ${t('title').replace(' ', '<br/>')}
            </h3>
        </div>`;
    }

    const borderClass = isWinner === true  ? 'border-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.6)] scale-105'
                      : isWinner === false ? 'border-gray-500 opacity-80'
                      :                     'border-[#8DC63F] shadow-lg';

    const statsRows = Object.keys(card.stats).map(key => {
        const isSel      = selectedStat === key;
        const suffix     = key === 'maxTemp' ? ' °C' : '';
        const clickAttr  = isActive && statFn ? `onclick="${statFn(key)}"` : '';
        return `
        <div ${clickAttr}
             class="stat-row flex justify-between items-center px-4 py-2 flex-1 border-b border-blue-400/30
                    text-white ${isActive ? 'cursor-pointer' : ''} transition-colors ${isSel ? 'stat-selected shadow-inner' : ''}">
            <span>${t('stats', key)}</span>
            <span class="font-bold">${card.stats[key]}${suffix}</span>
        </div>`;
    }).join('');

    return `
    <div class="w-64 md:w-72 h-[26rem] md:h-[28rem] bg-[#8DC63F] rounded-xl border-4 ${borderClass}
                flex flex-col overflow-hidden transition-all duration-300 relative select-none">
        <div class="h-[30%] relative flex items-center justify-center p-2">
            <div class="absolute inset-0 ${card.color} opacity-90"></div>
            <div class="relative z-10 text-center w-full px-1">
                <i data-lucide="${card.icon}" class="w-10 h-10 mx-auto text-white mb-1 drop-shadow-md"></i>
                <h2 class="font-bold text-white text-[0.95rem] leading-tight drop-shadow-md">${card.title[currentLang]}</h2>
                <p class="text-[0.65rem] text-white/80 mt-1 font-semibold tracking-wider uppercase">${card.type[currentLang]}</p>
            </div>
        </div>
        <div class="bg-[#4169E1] flex-1 flex flex-col text-sm border-t-2 border-[#2b4cba]">
            ${statsRows}
        </div>
        <div class="h-[25%] bg-[#3B5998] p-3 text-white text-xs overflow-y-auto leading-relaxed text-justify border-t-2 border-[#2b4cba]">
            ${card.desc[currentLang]}
        </div>
    </div>`;
}

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function toggleMusic() {
    initAudio();
    
    if (musicPlaying) {
        // Stop music
        musicPlaying = false;
        musicNodes.forEach(node => {
            try { node.stop(); } catch(e){}
            node.disconnect();
        });
        musicNodes = [];
        document.getElementById('icon-music').setAttribute('data-lucide', 'volume-x');
        document.getElementById('btn-music').classList.remove('text-[#8DC63F]');
        document.getElementById('btn-music').classList.add('text-slate-400');
    } else {
        // Play generative Sci-Fi Ambient Drone
        musicPlaying = true;
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        osc.type = 'sawtooth';
        osc.frequency.value = 55; // Low A frequency drone
        
        filter.type = 'lowpass';
        filter.frequency.value = 400;
        
        // LFO (Low Frequency Oscillator) to modulate pitch and filter = Sci-fi wobble
        const lfo = audioCtx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 0.2; // Slow oscillation
        
        const lfoPitchGain = audioCtx.createGain();
        lfoPitchGain.gain.value = 5;
        
        const lfoFilterGain = audioCtx.createGain();
        lfoFilterGain.gain.value = 150;

        lfo.connect(lfoPitchGain);
        lfoPitchGain.connect(osc.frequency);
        
        lfo.connect(lfoFilterGain);
        lfoFilterGain.connect(filter.frequency);

        gain.gain.value = 0.05; // Low background volume

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        lfo.start();
        
        musicNodes.push(osc, lfo, gain, filter, lfoPitchGain, lfoFilterGain);

        document.getElementById('icon-music').setAttribute('data-lucide', 'volume-2');
        document.getElementById('btn-music').classList.remove('text-slate-400');
        document.getElementById('btn-music').classList.add('text-[#8DC63F]');
    }
    lucide.createIcons();
}

function playSfx(type) {
    initAudio();
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    const now = audioCtx.currentTime;
    
    if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
    } else if (type === 'tick') {
        // Efeito de relógio/tempo passando rápido (gera 4 tiques repetidos)
        for (let i = 0; i < 4; i++) {
            const tOsc = audioCtx.createOscillator();
            const tGain = audioCtx.createGain();
            tOsc.connect(tGain);
            tGain.connect(audioCtx.destination);
            
            const time = now + (i * 0.5); // Toca a cada meio segundo
            
            tOsc.type = 'square'; 
            tOsc.frequency.setValueAtTime(800, time);
            tOsc.frequency.exponentialRampToValueAtTime(100, time + 0.05);
            
            tGain.gain.setValueAtTime(0, time);
            tGain.gain.linearRampToValueAtTime(0.05, time + 0.01);
            tGain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
            
            tOsc.start(time);
            tOsc.stop(time + 0.06);
        }
    } else if (type === 'win') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.setValueAtTime(600, now + 0.1);
        osc.frequency.setValueAtTime(800, now + 0.2);
        gain.gain.setValueAtTime(0.03, now);
        gain.gain.linearRampToValueAtTime(0.03, now + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
    } else if (type === 'lose') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
        gain.gain.setValueAtTime(0.03, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
    } else if (type === 'draw') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, now);
        gain.gain.setValueAtTime(0.03, now);
        gain.gain.setValueAtTime(0.001, now + 0.1);
        gain.gain.setValueAtTime(0.03, now + 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now);
        osc.stop(now + 0.25);
    }
}


// --- Info Modal ---
function toggleInfo() {
    const modal   = document.getElementById('info-modal');
    const content = document.getElementById('info-modal-content');
    if (modal.classList.contains('hidden')) {
        modal.classList.remove('hidden');
        setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        playSfx('click');
    } else {
        modal.classList.add('opacity-0');
        content.classList.add('scale-95');
        setTimeout(() => modal.classList.add('hidden'), 300);
        playSfx('click');
    }
}

// --- 3. Particle System (Background Simulation) ---
let particlesArray = [];
let canvas, ctx;

function initParticles() {
    canvas = document.getElementById('particles');
    ctx = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    particlesArray = [];
    const numParticles = Math.min(window.innerWidth / 12, 120);
    for (let i = 0; i < numParticles; i++) {
        particlesArray.push(new Particle());
    }
}

function resizeCanvas() {
    if(canvas) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
}

class Particle {
    constructor() {
        this.x = Math.random() * window.innerWidth;
        this.y = Math.random() * window.innerHeight;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
        // Material-like colors
        const colors = ['rgba(255, 165, 0, 0.4)', 'rgba(141, 198, 63, 0.4)', 'rgba(65, 105, 225, 0.4)', 'rgba(200, 200, 200, 0.4)'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.size > 0.2) this.size -= 0.005;
        
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height || this.size <= 0.2) {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 3 + 1;
        }
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function animateParticles() {
    if(!ctx || !canvas) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
    }
    connectParticles();
    requestAnimationFrame(animateParticles);
}

function connectParticles() {
    let opacityValue = 1;
    for (let a = 0; a < particlesArray.length; a++) {
        for (let b = a; b < particlesArray.length; b++) {
            let dx = particlesArray[a].x - particlesArray[b].x;
            let dy = particlesArray[a].y - particlesArray[b].y;
            let distance = dx * dx + dy * dy;
            
            if (distance < 12000) {
                opacityValue = 1 - (distance / 12000);
                ctx.strokeStyle = `rgba(141, 198, 63, ${opacityValue * 0.15})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                ctx.stroke();
            }
        }
    }
}
