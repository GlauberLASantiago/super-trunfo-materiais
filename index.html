let roundWinner = null;

function startGame() {
    playSfx('click');
    // Sorteia 10 cartas do baralho de 50
    const shuffledDeck = [...MASTER_DECK].sort(() => Math.random() - 0.5);
    const selectedCards = shuffledDeck.slice(0, 10);
    
    playerDeck = selectedCards.slice(0, 5);
    cpuDeck = selectedCards.slice(5, 10);
    
    gameState = 'playing';
    turn = 'player';
    selectedStat = null;
    roundWinner = null;
    tiedCards = [];
    render();
}

// --- LOGIC ---
function handleStatSelect(statKey) {
    if (gameState !== 'playing' || turn !== 'player') return;
    playSfx('click');
    selectedStat = statKey;
    
    // Inicia suspense
    gameState = 'resolving';
    playSfx('tick');
    render();
    
    // Aguarda 2 segundos antes de revelar o resultado
    setTimeout(() => {
        resolveRound(statKey);
    }, 2000);
}

function resolveRound(statKey) {
    const pVal = playerDeck[0].stats[statKey];
    const cVal = cpuDeck[0].stats[statKey];
    
    // Todos os atributos o maior vence, exceto custo onde menor é melhor (regra assumida)
    const isLowerBetter = statKey === 'cost'; 

    if (pVal === cVal) {
        roundWinner = 'draw';
        playSfx('draw');
    } else if (isLowerBetter) {
        roundWinner = pVal < cVal ? 'player' : 'cpu';
        playSfx(roundWinner === 'player' ? 'win' : 'lose');
    } else {
        roundWinner = pVal > cVal ? 'player' : 'cpu';
        playSfx(roundWinner === 'player' ? 'win' : 'lose');
    }
    
    gameState = 'result';
    render();
}

function nextRound() {
    playSfx('click');
    const pCard = playerDeck.shift();
    const cCard = cpuDeck.shift();
    
    if (roundWinner === 'player') {
        playerDeck.push(pCard, cCard, ...tiedCards);
        tiedCards = [];
        turn = 'player';
    } else if (roundWinner === 'cpu') {
        cpuDeck.push(cCard, pCard, ...tiedCards);
        tiedCards = [];
        turn = 'cpu';
    } else { // draw
        tiedCards.push(pCard, cCard);
    }

    selectedStat = null;
    roundWinner = null;

    if (playerDeck.length === 0 || cpuDeck.length === 0) {
        gameState = 'gameover';
    } else {
        gameState = 'playing';
        if (turn === 'cpu') {
            setTimeout(cpuPlayRound, 1500);
        }
    }
    render();
}

function cpuPlayRound() {
    if (gameState !== 'playing' || turn !== 'cpu' || cpuDeck.length === 0) return;
    
    const card = cpuDeck[0];
    let bestStat = 'maxTemp';
    let maxRel = -1;
    
    // Simple AI: pick stat with highest normalized value (rough approximation)
    const maxPossibles = { lifetime: 100, cost: 100, impact: 100, resistance: 100, maxTemp: 4000 };
    Object.keys(card.stats).forEach(stat => {
        let val = card.stats[stat];
        if(stat === 'cost') val = 100 - val; // invert cost for logic
        let relative = val / maxPossibles[stat];
        if (relative > maxRel) {
            maxRel = relative;
            bestStat = stat;
        }
    });

    selectedStat = bestStat;
    
    // Inicia suspense
    gameState = 'resolving';
    playSfx('tick');
    render();

    // Aguarda 2 segundos antes de revelar o resultado
    setTimeout(() => {
        resolveRound(bestStat);
    }, 2000);
}

// --- 1. Audio System (100% Native Audio Synthesizer - Fixes all loading/CORS issues) ---
let audioCtx;
let musicNodes = [];
let musicPlaying = false;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function toggleMusic() {
    initAudio();
    
    if (musicPlaying) {
        // Stop music
        musicPlaying = false;
        musicNodes.forEach(node => {
            try { node.stop(); } catch(e){}
            node.disconnect();
        });
        musicNodes = [];
        document.getElementById('icon-music').setAttribute('data-lucide', 'volume-x');
        document.getElementById('btn-music').classList.remove('text-[#8DC63F]');
        document.getElementById('btn-music').classList.add('text-slate-400');
    } else {
        // Play generative Sci-Fi Ambient Drone
        musicPlaying = true;
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        osc.type = 'sawtooth';
        osc.frequency.value = 55; // Low A frequency drone
        
        filter.type = 'lowpass';
        filter.frequency.value = 400;
        
        // LFO (Low Frequency Oscillator) to modulate pitch and filter = Sci-fi wobble
        const lfo = audioCtx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 0.2; // Slow oscillation
        
        const lfoPitchGain = audioCtx.createGain();
        lfoPitchGain.gain.value = 5;
        
        const lfoFilterGain = audioCtx.createGain();
        lfoFilterGain.gain.value = 150;

        lfo.connect(lfoPitchGain);
        lfoPitchGain.connect(osc.frequency);
        
        lfo.connect(lfoFilterGain);
        lfoFilterGain.connect(filter.frequency);

        gain.gain.value = 0.05; // Low background volume

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        lfo.start();
        
        musicNodes.push(osc, lfo, gain, filter, lfoPitchGain, lfoFilterGain);

        document.getElementById('icon-music').setAttribute('data-lucide', 'volume-2');
        document.getElementById('btn-music').classList.remove('text-slate-400');
        document.getElementById('btn-music').classList.add('text-[#8DC63F]');
    }
    lucide.createIcons();
}

function playSfx(type) {
    initAudio();
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    const now = audioCtx.currentTime;
    
    if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
    } else if (type === 'tick') {
        // Efeito de relógio/tempo passando rápido (gera 4 tiques repetidos)
        for (let i = 0; i < 4; i++) {
            const tOsc = audioCtx.createOscillator();
            const tGain = audioCtx.createGain();
            tOsc.connect(tGain);
            tGain.connect(audioCtx.destination);
            
            const time = now + (i * 0.5); // Toca a cada meio segundo
            
            tOsc.type = 'square'; 
            tOsc.frequency.setValueAtTime(800, time);
            tOsc.frequency.exponentialRampToValueAtTime(100, time + 0.05);
            
            tGain.gain.setValueAtTime(0, time);
            tGain.gain.linearRampToValueAtTime(0.05, time + 0.01);
            tGain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
            
            tOsc.start(time);
            tOsc.stop(time + 0.06);
        }
    } else if (type === 'win') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.setValueAtTime(600, now + 0.1);
        osc.frequency.setValueAtTime(800, now + 0.2);
        gain.gain.setValueAtTime(0.03, now);
        gain.gain.linearRampToValueAtTime(0.03, now + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
    } else if (type === 'lose') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
        gain.gain.setValueAtTime(0.03, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
    } else if (type === 'draw') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(300, now);
        gain.gain.setValueAtTime(0.03, now);
        gain.gain.setValueAtTime(0.001, now + 0.1);
        gain.gain.setValueAtTime(0.03, now + 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now);
        osc.stop(now + 0.25);
    }
}

// --- 2. Info Modal ---
function toggleInfo() {
    const modal = document.getElementById('info-modal');
    const content = document.getElementById('info-modal-content');
    if (modal.classList.contains('hidden')) {
        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95');
        }, 10);
        playSfx('click');
    } else {
        modal.classList.add('opacity-0');
        content.classList.add('scale-95');
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
        playSfx('click');
    }
}

// --- 3. Particle System (Background Simulation) ---
let particlesArray = [];
let canvas, ctx;

function initParticles() {
    canvas = document.getElementById('particles');
    ctx = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    particlesArray = [];
    const numParticles = Math.min(window.innerWidth / 12, 120);
    for (let i = 0; i < numParticles; i++) {
        particlesArray.push(new Particle());
    }
}

function resizeCanvas() {
    if(canvas) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
}

class Particle {
    constructor() {
        this.x = Math.random() * window.innerWidth;
        this.y = Math.random() * window.innerHeight;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
        // Material-like colors
        const colors = ['rgba(255, 165, 0, 0.4)', 'rgba(141, 198, 63, 0.4)', 'rgba(65, 105, 225, 0.4)', 'rgba(200, 200, 200, 0.4)'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.size > 0.2) this.size -= 0.005;
        
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height || this.size <= 0.2) {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 3 + 1;
        }
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function animateParticles() {
    if(!ctx || !canvas) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
    }
    connectParticles();
    requestAnimationFrame(animateParticles);
}

function connectParticles() {
    let opacityValue = 1;
    for (let a = 0; a < particlesArray.length; a++) {
        for (let b = a; b < particlesArray.length; b++) {
            let dx = particlesArray[a].x - particlesArray[b].x;
            let dy = particlesArray[a].y - particlesArray[b].y;
            let distance = dx * dx + dy * dy;
            
            if (distance < 12000) {
                opacityValue = 1 - (distance / 12000);
                ctx.strokeStyle = `rgba(141, 198, 63, ${opacityValue * 0.15})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                ctx.stroke();
            }
        }
    }
}

// Start
init();
